<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Normalize To Json</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d24;
    --surface-hover: #1e2530;
    --border: #2a2d35;
    --accent: #00d4aa;
    --accent2: #ff6b6b;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --key-color: #79c0ff;
    --str-color: #a5d6a7;
    --num-color: #ffd93d;
    --bool-color: #ff9800;
    --null-color: #90a4ae;
  }

  body.light {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f4f6fa;
    --surface-hover: #e8ecf4;
    --border: #dde1eb;
    --accent: #00957a;
    --accent2: #e53e3e;
    --text: #1a1d24;
    --text-dim: #7a8699;
    --key-color: #0550ae;
    --str-color: #1a7f37;
    --num-color: #953800;
    --bool-color: #cf222e;
    --null-color: #57606a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    flex-shrink: 0;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .header h1 {
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
    white-space: nowrap;
  }

  .header p {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* ── Theme btn ── */
  .theme-btn {
    margin-left: auto;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 2rem;
    height: 2rem;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .theme-btn:hover { border-color: var(--accent); background: var(--surface-hover); }

  /* ── App layout ── */
  .app-layout {
    flex: 1;
    display: flex;
    overflow: hidden;
    gap: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    flex-shrink: 0;
    padding: 0.7rem 0.9rem 0.5rem;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 700;
    border-bottom: 1px solid var(--border);
  }

  .examples-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .examples-list::-webkit-scrollbar { width: 4px; }
  .examples-list::-webkit-scrollbar-track { background: transparent; }
  .examples-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .example-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 7px;
    padding: 0.45rem 0.6rem;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.12s, background 0.12s;
    width: 100%;
  }

  .example-btn:hover {
    border-color: var(--border);
    background: var(--surface-hover);
  }

  .example-btn.active {
    border-color: var(--accent);
    background: rgba(0, 212, 170, 0.08);
  }

  body.light .example-btn.active {
    background: rgba(0, 149, 122, 0.08);
  }

  .ex-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.2rem;
    font-family: 'Syne', sans-serif;
  }

  .ex-preview {
    font-size: 0.65rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Main area ── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0.75rem;
    gap: 0.65rem;
    background: var(--bg);
  }

  /* ── Action row ── */
  .action-row {
    flex-shrink: 0;
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }

  /* ── Mode tabs ── */
  .mode-tabs {
    display: flex;
    gap: 0.25rem;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.2rem;
  }

  .mode-tab {
    background: transparent;
    border: none;
    border-radius: 7px;
    padding: 0.3rem 0.75rem;
    font-size: 0.78rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    color: var(--text-dim);
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .mode-tab.active {
    background: var(--accent);
    color: #0a0c10;
  }

  .mode-tab:not(.active):hover { color: var(--text); }

  /* ── Single mode buttons ── */
  .btn-normalize {
    background: var(--accent);
    color: #0a0c10;
    border: none;
    border-radius: 7px;
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-normalize:hover { opacity: 0.85; }

  .btn-clear {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.5rem 0.9rem;
    font-size: 0.82rem;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .btn-clear:hover { border-color: var(--text-dim); color: var(--text); }

  .btn-copy {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.5rem 0.9rem;
    font-size: 0.82rem;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    margin-left: auto;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .btn-copy:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-copy:disabled { opacity: 0.35; cursor: default; }

  /* ── Editor row (single mode) ── */
  .editor-row {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    overflow: hidden;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.55rem 0.9rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .panel-title {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 700;
  }

  .badge {
    font-size: 0.62rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 0.12rem 0.45rem;
    border-radius: 20px;
    font-weight: 600;
  }

  .badge-ok   { background: rgba(0,212,170,0.15); color: var(--accent); }
  .badge-err  { background: rgba(255,107,107,0.15); color: var(--accent2); }
  .badge-idle { background: rgba(100,116,139,0.15); color: var(--text-dim); }

  textarea {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.65;
    padding: 0.9rem;
  }

  #output-box {
    flex: 1;
    padding: 0.9rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-y: auto;
  }

  #output-box::-webkit-scrollbar { width: 5px; }
  #output-box::-webkit-scrollbar-track { background: transparent; }
  #output-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .null-result { color: var(--accent2); font-style: italic; }

  /* ── Syntax highlight ── */
  .jk  { color: var(--key-color); }
  .js  { color: var(--str-color); }
  .jn  { color: var(--num-color); }
  .jb  { color: var(--bool-color); }
  .jnl { color: var(--null-color); }

  /* ══════════════════════════════════════════════
     CSV MODE
  ══════════════════════════════════════════════ */

  #csv-actions {
    display: none;
    align-items: center;
    gap: 0.6rem;
    flex: 1;
  }

  .col-label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  select.col-select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.38rem 0.6rem;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    max-width: 220px;
    outline: none;
  }

  .csv-stats {
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .csv-stats .ok  { color: var(--accent); }
  .csv-stats .err { color: var(--accent2); }

  /* ── CSV content area ── */
  #csv-content {
    display: none;
    flex: 1;
    flex-direction: column;
    gap: 0.65rem;
    overflow: hidden;
  }

  /* Drop zone */
  .drop-zone {
    flex: 1;
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 0.88rem;
    user-select: none;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(0, 212, 170, 0.04);
  }

  .drop-zone svg { opacity: 0.35; }

  .drop-zone-hint {
    font-size: 0.72rem;
    opacity: 0.65;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Results table */
  .csv-table-wrap {
    flex: 1;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }

  .csv-table-wrap::-webkit-scrollbar { width: 5px; }
  .csv-table-wrap::-webkit-scrollbar-track { background: transparent; }
  .csv-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .csv-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
  }

  .csv-table thead {
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .csv-table th {
    background: var(--surface2);
    padding: 0.5rem 0.75rem;
    text-align: left;
    font-size: 0.61rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    white-space: nowrap;
  }

  .csv-table tr.data-row {
    cursor: pointer;
    transition: background 0.1s;
  }

  .csv-table tr.data-row:hover { background: var(--surface-hover); }
  .csv-table tr.data-row.expanded { background: var(--surface2); }

  .csv-table td {
    padding: 0.4rem 0.75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .td-num    { width: 3rem; color: var(--text-dim); text-align: right; white-space: nowrap; }
  .td-status { width: 7.5rem; white-space: nowrap; }
  .td-input  { width: 35%; max-width: 0; }
  .td-output { max-width: 0; }

  .cell-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
    color: var(--text);
  }

  .td-input .cell-text { color: var(--text-dim); }

  /* Detail expanded row */
  tr.detail-row td {
    padding: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .detail-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    padding: 0.6rem 0.75rem 0.75rem;
  }

  .detail-pane {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .detail-pane-header {
    flex-shrink: 0;
    padding: 0.3rem 0.6rem;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'Syne', sans-serif;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .btn-copy-sm {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.68rem;
    padding: 0;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    transition: color 0.12s;
  }

  .btn-copy-sm:hover { color: var(--accent); }

  .detail-pane-body {
    flex: 1;
    padding: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.73rem;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.6;
    color: var(--text);
  }

  .detail-pane-body::-webkit-scrollbar { width: 4px; }
  .detail-pane-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>Normalize To Json</h1>
  <p>Chuyển đổi Java toString, Kotlin data class, unquoted object… thành JSON hợp lệ.</p>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Chuyển giao diện sáng/tối">🌙</button>
</div>

<div class="app-layout">

  <!-- Sidebar examples -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">Ví dụ có sẵn</div>
    <div class="examples-list" id="examples-grid"></div>
  </aside>

  <!-- Main -->
  <div class="main-area">

    <!-- Action row -->
    <div class="action-row">
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-single" onclick="switchMode('single')">Single</button>
        <button class="mode-tab"        id="tab-csv"    onclick="switchMode('csv')">CSV</button>
      </div>

      <!-- Single mode actions -->
      <div id="single-actions" style="display:flex;gap:0.6rem;align-items:center;flex:1">
        <button class="btn-normalize" onclick="runNormalize()">Normalize →</button>
        <button class="btn-clear" onclick="clearAll()">Xoá</button>
        <button class="btn-copy" id="btn-copy" onclick="copyOutput()" disabled>Sao chép kết quả</button>
      </div>

      <!-- CSV mode actions -->
      <div id="csv-actions">
        <button class="btn-normalize" onclick="document.getElementById('csv-file-input').click()">Mở CSV…</button>
        <input type="file" id="csv-file-input" accept=".csv,.txt" style="display:none" onchange="handleFileLoad(this.files[0])">

        <label class="col-label" id="col-label" style="display:none">
          Cột:&nbsp;<select class="col-select" id="col-select" onchange="runCSVConvert()"></select>
        </label>

        <span class="csv-stats" id="csv-stats"></span>

        <button class="btn-copy" id="btn-download" onclick="downloadResults()" disabled style="margin-left:auto">
          Tải JSON
        </button>
      </div>
    </div>

    <!-- Single mode: editor panels -->
    <div class="editor-row" id="editor-row">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Input</span>
        </div>
        <textarea id="input-area" placeholder="Dán chuỗi cần chuẩn hóa vào đây…" oninput="onInputChange()"></textarea>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Output JSON</span>
          <span class="badge badge-idle" id="status-badge">—</span>
        </div>
        <div id="output-box"><span style="color:var(--text-dim);font-style:italic">Kết quả sẽ hiển thị ở đây…</span></div>
      </div>
    </div>

    <!-- CSV mode: content -->
    <div id="csv-content">

      <!-- Drop zone (shown when no file loaded) -->
      <div class="drop-zone" id="drop-zone"
           onclick="document.getElementById('csv-file-input').click()"
           ondragover="event.preventDefault();this.classList.add('dragover')"
           ondragleave="this.classList.remove('dragover')"
           ondrop="event.preventDefault();this.classList.remove('dragover');handleFileLoad(event.dataTransfer.files[0])">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <polyline points="9,15 12,12 15,15"/>
        </svg>
        <span>Kéo thả file CSV vào đây hoặc click để chọn</span>
        <span class="drop-zone-hint">Hỗ trợ .csv · Cột chứa request sẽ được tự động nhận diện</span>
      </div>

      <!-- Results table (shown after file loaded) -->
      <div class="csv-table-wrap" id="csv-table-wrap" style="display:none">
        <table class="csv-table">
          <thead>
            <tr>
              <th class="td-num">#</th>
              <th class="td-status">Status</th>
              <th class="td-input">Input</th>
              <th class="td-output">Output JSON</th>
            </tr>
          </thead>
          <tbody id="csv-tbody"></tbody>
        </table>
      </div>

    </div>
    <!-- /csv-content -->

  </div>
</div>

<script src="normalizeToJson.js"></script>
<script>

/* ──────────────────────────────────────────
   EXAMPLES (single mode)
────────────────────────────────────────── */
const EXAMPLES = [
  { title: 'Java toString()',        input: 'Person{name=John, age=30, active=true}' },
  { title: 'Kotlin data class',      input: 'User(id=123, email=test@example.com, active=true, score=99.5)' },
  { title: 'Class lồng nhau',        input: 'Order{id=42, customer=Customer{name=Alice, city=Hanoi}, total=1500}' },
  { title: 'Single-quoted values',   input: "{name='Nguyễn Văn A', role='admin', dept='IT'}" },
  { title: 'Unquoted key: value',    input: '{type: book, price: 250, inStock: true}' },
  { title: 'JAN code list',          input: '[4910024340432, 4910024340524, 4910024340616]0true' },
  { title: 'Truncated (thiếu })',    input: '{name=Bob, age=25, city=Tokyo' },
  { title: 'Datetime value',         input: '{currentDate=Thu Apr 27 12:48:04 JST 2023, status=active}' },
  { title: 'Leading-zero code',      input: '{janCode=0123456789012, productName=SampleItem}' },
  { title: "Single-quote chưa đóng", input: "{dateOfCompany='20230701, nextKey='B002}" },
  { title: 'Array giá trị',          input: '{tags=foo, bar, baz, "next": true}' },
  { title: 'Dấu phẩy thừa',          input: '{name=Charlie, age=28,}' },
];

const grid = document.getElementById('examples-grid');
EXAMPLES.forEach((ex, i) => {
  const btn = document.createElement('button');
  btn.className = 'example-btn';
  btn.innerHTML = `<div class="ex-title">${ex.title}</div><div class="ex-preview">${escHtml(ex.input)}</div>`;
  btn.onclick = () => loadExample(i);
  grid.appendChild(btn);
});

function loadExample(idx) {
  document.querySelectorAll('.example-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('input-area').value = EXAMPLES[idx].input;
  runNormalize();
}

/* ──────────────────────────────────────────
   MODE TOGGLE
────────────────────────────────────────── */
function switchMode(m) {
  const isCsv = m === 'csv';
  document.getElementById('tab-single').classList.toggle('active', !isCsv);
  document.getElementById('tab-csv').classList.toggle('active', isCsv);
  document.getElementById('single-actions').style.display = isCsv ? 'none' : 'flex';
  document.getElementById('csv-actions').style.display    = isCsv ? 'flex' : 'none';
  document.getElementById('editor-row').style.display     = isCsv ? 'none' : 'grid';
  document.getElementById('csv-content').style.display    = isCsv ? 'flex' : 'none';
  document.getElementById('sidebar').style.display        = isCsv ? 'none' : 'flex';
}

/* ──────────────────────────────────────────
   SINGLE MODE LOGIC
────────────────────────────────────────── */
function runNormalize() {
  const input  = document.getElementById('input-area').value;
  const badge  = document.getElementById('status-badge');
  const box    = document.getElementById('output-box');
  const copyBtn = document.getElementById('btn-copy');

  if (!input.trim()) {
    box.innerHTML = '<span style="color:var(--text-dim);font-style:italic">Kết quả sẽ hiển thị ở đây…</span>';
    badge.textContent = '—'; badge.className = 'badge badge-idle';
    copyBtn.disabled = true;
    return;
  }

  const result = normalizeToJson(input);
  if (result === null) {
    box.innerHTML = '<span class="null-result">null — không thể parse chuỗi này.</span>';
    badge.textContent = 'null'; badge.className = 'badge badge-err';
    copyBtn.disabled = true;
  } else {
    box.innerHTML = syntaxHighlight(JSON.stringify(JSON.parse(result), null, 2));
    badge.textContent = 'valid JSON'; badge.className = 'badge badge-ok';
    copyBtn.disabled = false;
  }
}

function clearAll() {
  document.getElementById('input-area').value = '';
  document.querySelectorAll('.example-btn').forEach(b => b.classList.remove('active'));
  runNormalize();
}

function onInputChange() {
  document.querySelectorAll('.example-btn').forEach(b => b.classList.remove('active'));
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output-box').innerText).then(() => {
    const btn = document.getElementById('btn-copy');
    const orig = btn.textContent;
    btn.textContent = 'Đã sao chép!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

/* ──────────────────────────────────────────
   CSV MODE LOGIC
────────────────────────────────────────── */
let csvRows      = [];   // all parsed rows (raw strings per cell)
let csvHasHeader = false;
let csvResults   = [];   // [{rowNum, input, result, json, skipped}]

/** RFC 4180-compatible CSV parser (supports quoted fields with embedded newlines) */
function parseCSV(text) {
  const rows = [];
  let i = 0;
  const n = text.length;

  while (i < n) {
    const row = [];
    while (i < n) {
      let field = '';
      if (text[i] === '"') {
        i++;
        while (i < n) {
          if (text[i] === '"') {
            if (i + 1 < n && text[i + 1] === '"') { field += '"'; i += 2; }
            else { i++; break; }
          } else {
            field += text[i++];
          }
        }
      } else {
        while (i < n && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r')
          field += text[i++];
      }
      row.push(field);
      if (i < n && text[i] === ',') { i++; continue; }
      if (i < n && text[i] === '\r') i++;
      if (i < n && text[i] === '\n') i++;
      break;
    }
    if (row.some(f => f.trim())) rows.push(row);
  }
  return rows;
}

function handleFileLoad(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    if (rows.length === 0) return;

    csvRows = rows;

    // Detect header: first row cells are short plain strings (no {, (, =)
    csvHasHeader = rows[0].every(c => {
      const t = c.trim();
      return t.length > 0 && t.length < 60 && !/[{}()=]/.test(t);
    });

    // Build column selector
    const headers = csvHasHeader ? rows[0] : rows[0].map((_, i) => 'Column ' + (i + 1));
    const sel = document.getElementById('col-select');
    sel.innerHTML = '';
    headers.forEach((h, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = (i + 1) + '. ' + (h.length > 35 ? h.slice(0, 35) + '…' : h);
      sel.appendChild(opt);
    });

    // Auto-detect: prefer column whose header contains REQUEST, fallback to col 0
    let autoCol = 0;
    if (csvHasHeader) {
      const ri = headers.findIndex(h => /request/i.test(h));
      if (ri >= 0) autoCol = ri;
    }
    sel.value = autoCol;

    document.getElementById('col-label').style.display = '';
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('csv-table-wrap').style.display = '';

    runCSVConvert();
  };
  reader.readAsText(file);
}

function runCSVConvert() {
  const colIdx = parseInt(document.getElementById('col-select').value, 10);
  const dataRows = csvHasHeader ? csvRows.slice(1) : csvRows;

  csvResults = dataRows.map((row, i) => {
    const rowNum = i + (csvHasHeader ? 2 : 1);
    const input  = (row[colIdx] || '').trim();
    if (!input) return { rowNum, input, result: null, json: null, skipped: true };

    const result = normalizeToJson(input);
    let json = null;
    try { if (result) json = JSON.parse(result); } catch (_) {}
    return { rowNum, input, result, json, skipped: false };
  });

  renderCSVTable();
}

function renderCSVTable() {
  const tbody  = document.getElementById('csv-tbody');
  const total   = csvResults.length;
  const passed  = csvResults.filter(r => r.result).length;
  const failed  = csvResults.filter(r => !r.skipped && !r.result).length;
  const skipped = csvResults.filter(r => r.skipped).length;

  // Stats
  let statsHtml = `<span class="ok">${passed}</span> / ${total} converted`;
  if (failed)  statsHtml += ` · <span class="err">${failed} failed</span>`;
  if (skipped) statsHtml += ` · ${skipped} skipped`;
  document.getElementById('csv-stats').innerHTML = statsHtml;
  document.getElementById('btn-download').disabled = passed === 0;

  // Table rows
  tbody.innerHTML = '';
  csvResults.forEach((r, idx) => {
    const tr = document.createElement('tr');
    tr.className = 'data-row';

    const badgeCls  = r.skipped ? 'badge-idle' : r.result ? 'badge-ok' : 'badge-err';
    const badgeTxt  = r.skipped ? 'skip' : r.result ? 'valid JSON' : 'null';
    const inputPrev = r.input.replace(/\s+/g, ' ').slice(0, 100);
    const outPrev   = r.json
      ? JSON.stringify(r.json).replace(/"/g, '').slice(0, 100)
      : (r.skipped ? '' : 'null — không parse được');

    tr.innerHTML = `
      <td class="td-num">${r.rowNum}</td>
      <td class="td-status"><span class="badge ${badgeCls}">${badgeTxt}</span></td>
      <td class="td-input"><span class="cell-text">${escHtml(inputPrev)}</span></td>
      <td class="td-output"><span class="cell-text" style="${!r.result && !r.skipped ? 'color:var(--accent2);font-style:italic' : ''}">${escHtml(outPrev)}</span></td>
    `;

    tr.onclick = () => toggleDetail(tr, idx);
    tbody.appendChild(tr);
  });
}

function toggleDetail(tr, idx) {
  // Collapse if already open
  const next = tr.nextElementSibling;
  if (next && next.classList.contains('detail-row')) {
    next.remove();
    tr.classList.remove('expanded');
    return;
  }

  tr.classList.add('expanded');
  const r = csvResults[idx];
  const jsonStr = r.json ? JSON.stringify(r.json, null, 2) : null;

  const detail = document.createElement('tr');
  detail.className = 'detail-row';
  detail.innerHTML = `
    <td colspan="4">
      <div class="detail-content">
        <div class="detail-pane">
          <div class="detail-pane-header">
            <span>Input</span>
            <button class="btn-copy-sm" data-copy="input">Copy</button>
          </div>
          <div class="detail-pane-body">${escHtml(r.input)}</div>
        </div>
        <div class="detail-pane">
          <div class="detail-pane-header">
            <span>Output JSON</span>
            ${jsonStr ? '<button class="btn-copy-sm" data-copy="json">Copy</button>' : ''}
          </div>
          <div class="detail-pane-body">${
            jsonStr
              ? syntaxHighlight(jsonStr)
              : '<span style="color:var(--accent2);font-style:italic">null — không parse được</span>'
          }</div>
        </div>
      </div>
    </td>
  `;

  // Attach copy button handlers
  detail.querySelector('[data-copy="input"]').addEventListener('click', e => {
    e.stopPropagation();
    copyText(r.input, e.currentTarget);
  });
  const jsonCopyBtn = detail.querySelector('[data-copy="json"]');
  if (jsonCopyBtn) {
    jsonCopyBtn.addEventListener('click', e => {
      e.stopPropagation();
      copyText(jsonStr, e.currentTarget);
    });
  }

  tr.parentNode.insertBefore(detail, tr.nextSibling);
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function downloadResults() {
  const arr = csvResults.filter(r => r.json).map(r => r.json);
  const blob = new Blob([JSON.stringify(arr, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `normalized_${new Date()
          .toISOString()
          .replace('T', '_')
          .replace(/:/g, '-')
          .slice(0, 19)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ──────────────────────────────────────────
   SHARED HELPERS
────────────────────────────────────────── */
function syntaxHighlight(json) {
  return escHtml(json).replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    m => {
      if (/^"/.test(m)) return `<span class="${/:$/.test(m) ? 'jk' : 'js'}">${m}</span>`;
      if (/true|false/.test(m)) return `<span class="jb">${m}</span>`;
      if (/null/.test(m))       return `<span class="jnl">${m}</span>`;
      return `<span class="jn">${m}</span>`;
    }
  );
}

function escHtml(unsafe) {
  return unsafe
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          // .replace(/"/g, "&quot;");
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('normalize-json-theme', isLight ? 'light' : 'dark');
}

/* ── Init ── */
if (localStorage.getItem('normalize-json-theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('theme-btn').textContent = '☀️';
}

if (document.getElementById('input-area').value) runNormalize();
</script>
