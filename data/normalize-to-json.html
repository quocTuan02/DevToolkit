<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Normalize To Json</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d24;
    --surface-hover: #1e2530;
    --border: #2a2d35;
    --accent: #00d4aa;
    --accent2: #ff6b6b;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --key-color: #79c0ff;
    --str-color: #a5d6a7;
    --num-color: #ffd93d;
    --bool-color: #ff9800;
    --null-color: #90a4ae;
  }

  body.light {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f4f6fa;
    --surface-hover: #e8ecf4;
    --border: #dde1eb;
    --accent: #00957a;
    --accent2: #e53e3e;
    --text: #1a1d24;
    --text-dim: #7a8699;
    --key-color: #0550ae;
    --str-color: #1a7f37;
    --num-color: #953800;
    --bool-color: #cf222e;
    --null-color: #57606a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    flex-shrink: 0;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .header h1 {
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
    white-space: nowrap;
  }

  .header p {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* ── Theme btn ── */
  .theme-btn {
    margin-left: auto;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 2rem;
    height: 2rem;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .theme-btn:hover { border-color: var(--accent); background: var(--surface-hover); }

  /* ── App layout ── */
  .app-layout {
    flex: 1;
    display: flex;
    overflow: hidden;
    gap: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    flex-shrink: 0;
    padding: 0.7rem 0.9rem 0.5rem;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 700;
    border-bottom: 1px solid var(--border);
  }

  .examples-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .examples-list::-webkit-scrollbar { width: 4px; }
  .examples-list::-webkit-scrollbar-track { background: transparent; }
  .examples-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .example-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 7px;
    padding: 0.45rem 0.6rem;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.12s, background 0.12s;
    width: 100%;
  }

  .example-btn:hover {
    border-color: var(--border);
    background: var(--surface-hover);
  }

  .example-btn.active {
    border-color: var(--accent);
    background: rgba(0, 212, 170, 0.08);
  }

  body.light .example-btn.active {
    background: rgba(0, 149, 122, 0.08);
  }

  .ex-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.2rem;
    font-family: 'Syne', sans-serif;
  }

  .ex-preview {
    font-size: 0.65rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Main area ── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0.75rem;
    gap: 0.65rem;
    background: var(--bg);
  }

  /* ── Action row ── */
  .action-row {
    flex-shrink: 0;
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }

  .btn-normalize {
    background: var(--accent);
    color: #0a0c10;
    border: none;
    border-radius: 7px;
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-normalize:hover { opacity: 0.85; }

  .btn-clear {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.5rem 0.9rem;
    font-size: 0.82rem;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-clear:hover { border-color: var(--text-dim); color: var(--text); }

  .btn-copy {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.5rem 0.9rem;
    font-size: 0.82rem;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    margin-left: auto;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-copy:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-copy:disabled { opacity: 0.35; cursor: default; }

  /* ── Editor row ── */
  .editor-row {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    overflow: hidden;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.55rem 0.9rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .panel-title {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 700;
  }

  .badge {
    font-size: 0.62rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 0.12rem 0.45rem;
    border-radius: 20px;
    font-weight: 600;
  }

  .badge-ok   { background: rgba(0,212,170,0.15); color: var(--accent); }
  .badge-err  { background: rgba(255,107,107,0.15); color: var(--accent2); }
  .badge-idle { background: rgba(100,116,139,0.15); color: var(--text-dim); }

  textarea {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.65;
    padding: 0.9rem;
  }

  #output-box {
    flex: 1;
    padding: 0.9rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-y: auto;
  }

  #output-box::-webkit-scrollbar { width: 5px; }
  #output-box::-webkit-scrollbar-track { background: transparent; }
  #output-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .null-result { color: var(--accent2); font-style: italic; }

  /* ── Syntax highlight ── */
  .jk  { color: var(--key-color); }
  .js  { color: var(--str-color); }
  .jn  { color: var(--num-color); }
  .jb  { color: var(--bool-color); }
  .jnl { color: var(--null-color); }
</style>
</head>
<body>

<div class="header">
  <h1>Normalize To Json</h1>
  <p>Chuyển đổi Java toString, Kotlin data class, unquoted object… thành JSON hợp lệ.</p>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Chuyển giao diện sáng/tối">🌙</button>
</div>

<div class="app-layout">

  <!-- Sidebar examples -->
  <aside class="sidebar">
    <div class="sidebar-header">Ví dụ có sẵn</div>
    <div class="examples-list" id="examples-grid"></div>
  </aside>

  <!-- Main -->
  <div class="main-area">

    <div class="action-row">
      <button class="btn-normalize" onclick="runNormalize()">Normalize →</button>
      <button class="btn-clear" onclick="clearAll()">Xoá</button>
      <button class="btn-copy" id="btn-copy" onclick="copyOutput()" disabled>Sao chép kết quả</button>
    </div>

    <div class="editor-row">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Input</span>
        </div>
        <textarea id="input-area" placeholder="Dán chuỗi cần chuẩn hóa vào đây…" oninput="onInputChange()"></textarea>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Output JSON</span>
          <span class="badge badge-idle" id="status-badge">—</span>
        </div>
        <div id="output-box"><span style="color:var(--text-dim);font-style:italic">Kết quả sẽ hiển thị ở đây…</span></div>
      </div>
    </div>

  </div>
</div>

<script src="normalizeToJson.js"></script>
<script>
const EXAMPLES = [
  { title: 'Java toString()',        input: 'Person{name=John, age=30, active=true}' },
  { title: 'Kotlin data class',      input: 'User(id=123, email=test@example.com, active=true, score=99.5)' },
  { title: 'Class lồng nhau',        input: 'Order{id=42, customer=Customer{name=Alice, city=Hanoi}, total=1500}' },
  { title: 'Single-quoted values',   input: "{name='Nguyễn Văn A', role='admin', dept='IT'}" },
  { title: 'Unquoted key: value',    input: '{type: book, price: 250, inStock: true}' },
  { title: 'JAN code list',          input: '[4910024340432, 4910024340524, 4910024340616]0true' },
  { title: 'Truncated (thiếu })',    input: '{name=Bob, age=25, city=Tokyo' },
  { title: 'Datetime value',         input: '{currentDate=Thu Apr 27 12:48:04 JST 2023, status=active}' },
  { title: 'Leading-zero code',      input: '{janCode=0123456789012, productName=SampleItem}' },
  { title: "Single-quote chưa đóng", input: "{dateOfCompany='20230701, nextKey='B002}" },
  { title: 'Array giá trị',          input: '{tags=foo, bar, baz, "next": true}' },
  { title: 'Dấu phẩy thừa',          input: '{name=Charlie, age=28,}' },
];

const grid = document.getElementById('examples-grid');
EXAMPLES.forEach((ex, i) => {
  const btn = document.createElement('button');
  btn.className = 'example-btn';
  btn.innerHTML = `<div class="ex-title">${ex.title}</div><div class="ex-preview">${escHtml(ex.input)}</div>`;
  btn.onclick = () => loadExample(i);
  grid.appendChild(btn);
});

function loadExample(idx) {
  document.querySelectorAll('.example-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('input-area').value = EXAMPLES[idx].input;
  runNormalize();
}

function runNormalize() {
  const input = document.getElementById('input-area').value;
  const badge   = document.getElementById('status-badge');
  const box     = document.getElementById('output-box');
  const copyBtn = document.getElementById('btn-copy');

  if (!input.trim()) {
    box.innerHTML = '<span style="color:var(--text-dim);font-style:italic">Kết quả sẽ hiển thị ở đây…</span>';
    badge.textContent = '—'; badge.className = 'badge badge-idle';
    copyBtn.disabled = true;
    return;
  }

  const result = normalizeToJson(input);
  if (result === null) {
    box.innerHTML = '<span class="null-result">null — không thể parse chuỗi này.</span>';
    badge.textContent = 'null'; badge.className = 'badge badge-err';
    copyBtn.disabled = true;
  } else {
    box.innerHTML = syntaxHighlight(JSON.stringify(JSON.parse(result), null, 2));
    badge.textContent = 'valid JSON'; badge.className = 'badge badge-ok';
    copyBtn.disabled = false;
  }
}

function clearAll() {
  document.getElementById('input-area').value = '';
  document.querySelectorAll('.example-btn').forEach(b => b.classList.remove('active'));
  runNormalize();
}

function onInputChange() {
  document.querySelectorAll('.example-btn').forEach(b => b.classList.remove('active'));
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output-box').innerText).then(() => {
    const btn = document.getElementById('btn-copy');
    const orig = btn.textContent;
    btn.textContent = 'Đã sao chép!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function syntaxHighlight(json) {
  return escHtml(json).replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    m => {
      if (/^"/.test(m)) return `<span class="${/:$/.test(m) ? 'jk' : 'js'}">${m}</span>`;
      if (/true|false/.test(m)) return `<span class="jb">${m}</span>`;
      if (/null/.test(m))       return `<span class="jnl">${m}</span>`;
      return `<span class="jn">${m}</span>`;
    }
  );
}

function escHtml(unsafe) {
  return unsafe
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          // .replace(/"/g, "&quot;");
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('normalize-json-theme', isLight ? 'light' : 'dark');
}

if (localStorage.getItem('normalize-json-theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('theme-btn').textContent = '☀️';
}

if (document.getElementById('input-area').value) runNormalize();
</script>
</body>
</html>
